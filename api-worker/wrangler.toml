# api-worker/wrangler.toml
#
# Wrangler configuration for the NummyGo API Worker.
# Reference: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "nummygo-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Enable Node.js compatibility APIs (crypto, URL, etc.)
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────────────────────────────
# Create a D1 database with: wrangler d1 create nummygo-db
# Then copy the database_id here.
[[d1_databases]]
binding      = "DB"
database_name = "nummygo-db"
database_id  = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ── Durable Objects ───────────────────────────────────────────────────────────
# TenantOrderDO manages WebSocket connections grouped by tenantId.
[durable_objects]
bindings = [
  { name = "TENANT_ORDER_DO", class_name = "TenantOrderDO" }
]

# Durable Objects must declare their migrations.
# First deployment creates the DO namespace.
[[migrations]]
tag = "v1"
new_classes = ["TenantOrderDO"]

# ── Environment variables ─────────────────────────────────────────────────────
# Add secrets with: wrangler secret put SECRET_NAME
[vars]
ENVIRONMENT = "development"

# ── CORS origins ──────────────────────────────────────────────────────────────
# Set to your actual frontend URLs in production.
# In dev these are the Next.js dev servers.
CORS_ORIGIN = "http://localhost:3000,http://localhost:3001"
